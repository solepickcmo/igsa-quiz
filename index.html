<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이그사 강의 로드맵 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:    #0F7B6C;
    --teal-lt: #E1F5EE;
    --teal-md: #1DB89E;
    --navy:    #0F1F33;
    --cream:   #FAFAF7;
    --warm:    #F5F0E8;
    --text:    #1A1A1A;
    --muted:   #6B7280;
    --border:  #E2E2DC;
    --radius:  16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 패턴 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(29,184,158,0.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(15,31,51,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* 헤더 */
  .site-header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.5s ease both;
  }
  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--navy);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 1rem;
  }
  .logo-dot { width: 6px; height: 6px; background: var(--teal-md); border-radius: 50%; }
  .site-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 6vw, 34px);
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .site-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* 카드 */
  .card {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.75rem 1.5rem;
    animation: fadeUp 0.4s ease both;
  }

  /* 프로그레스 */
  .prog-wrap { margin-bottom: 1.5rem; }
  .prog-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .prog-track {
    height: 3px;
    background: #EBEBEB;
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-md));
    border-radius: 2px;
    transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
  }

  /* 질문 */
  .q-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--teal);
    margin-bottom: 0.5rem;
  }
  .q-main {
    font-size: 19px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.45;
    margin-bottom: 0.3rem;
  }
  .q-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.4rem;
    line-height: 1.5;
  }

  /* 옵션 버튼 */
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s ease;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .opt::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--teal-lt);
    opacity: 0;
    transition: opacity 0.18s;
  }
  .opt:hover { border-color: var(--teal-md); transform: translateY(-1px); }
  .opt:hover::before { opacity: 0.4; }
  .opt.selected { border-color: var(--teal); background: var(--teal-lt); }
  .opt.selected::before { opacity: 1; }
  .opt-icon {
    font-size: 22px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    margin-top: 1px;
  }
  .opt-body { position: relative; z-index: 1; }
  .opt-main { font-size: 14px; font-weight: 700; color: var(--navy); }
  .opt-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
  .opt.selected .opt-main { color: var(--teal); }

  /* 다음 버튼 */
  .nav { display: flex; justify-content: flex-end; }
  .next-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 26px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 100px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
  }
  .next-btn:hover:not(:disabled) { background: var(--teal); transform: translateY(-1px); }
  .next-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .next-arrow { font-size: 16px; }

  /* 결과 */
  .result-wrap { animation: fadeUp 0.5s ease both; }

  .result-hero {
    text-align: center;
    padding: 2rem 1.5rem 1.75rem;
    border-radius: var(--radius);
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }
  .result-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M20 20.5V18H0v5h5v5H0v5h20v-5h5v5h15v-5H25v-5h15V18H20v2.5z'/%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .result-emoji { font-size: 42px; margin-bottom: 0.75rem; display: block; }
  .result-type-label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 4px 12px;
    border-radius: 100px;
    background: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.9);
    margin-bottom: 0.6rem;
  }
  .result-type {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: #fff;
    line-height: 1.25;
    margin-bottom: 0.4rem;
  }
  .result-persona { font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.6; }

  .result-body { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 1.5rem; }

  .road-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }
  .road-steps { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem; }
  .road-step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
  }
  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .step-name { font-size: 14px; font-weight: 700; color: var(--navy); }
  .step-cat { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .tip-box {
    background: var(--warm);
    border-left: 3px solid var(--teal);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    font-size: 13px;
    color: #444;
    line-height: 1.65;
  }
  .step-link {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--teal);
    background: rgba(15,123,108,0.1);
    border: 1px solid rgba(15,123,108,0.3);
    border-radius: 100px;
    padding: 4px 11px;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .step-link:hover { background: var(--teal); color: #fff; border-color: var(--teal); }
  .tip-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--teal); margin-bottom: 4px; }

  .restart-row { text-align: center; margin-top: 1.25rem; }
  .restart-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 9px 22px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  .restart-btn:hover { border-color: var(--teal); color: var(--teal); }

  /* 푸터 */
  .site-footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.8;
  }
  .site-footer a { color: var(--teal); text-decoration: none; }
  .site-footer a:hover { text-decoration: underline; }

  /* 애니메이션 */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card { animation-delay: 0.1s; }

  /* 모바일 */
  @media (max-width: 480px) {
    .page { padding: 1.5rem 1rem 3rem; }
    .card { padding: 1.25rem 1.1rem; }
    .q-main { font-size: 17px; }
    .result-type { font-size: 22px; }
  }
</style>
</head>

let answers = [];
let curQ = 0;

function getResult() {
  const [a0, a1, a2, a3] = answers;
  if (a2 === "ai") return RESULTS.ai_any;
  const key = a0 + "_" + a1;
  return RESULTS[key] || RESULTS.default;
}

function render() {
  const q = Qs[curQ];
  const pct = Math.round((curQ / Qs.length) * 100);
  document.getElementById("step-lbl").textContent = `질문 ${curQ + 1} / ${Qs.length}`;
  document.getElementById("step-pct").textContent = pct + "%";
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("q-label").textContent = q.label;
  document.getElementById("q-main").textContent  = q.main;
  document.getElementById("q-sub").textContent   = q.sub;

  const container = document.getElementById("options");
  container.innerHTML = "";
  q.opts.forEach(o => {
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.innerHTML = `
      <span class="opt-icon">${o.icon}</span>
      <span class="opt-body">
        <span class="opt-main">${o.main}</span>
        <span class="opt-desc">${o.desc}</span>
      </span>`;
    btn.onclick = () => {
      document.querySelectorAll(".opt").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      answers[curQ] = o.val;
      document.getElementById("next-btn").disabled = false;
    };
    container.appendChild(btn);
  });

  const nb = document.getElementById("next-btn");
  nb.disabled = true;
  nb.innerHTML = curQ === Qs.length - 1
    ? "결과 보기 <span class='next-arrow'>✓</span>"
    : "다음 <span class='next-arrow'>→</span>";
}

function nextQ() {
  if (curQ < Qs.length - 1) {
    curQ++;
    render();
  } else {
    showResult();
  }
}

function showResult() {
  const r = getResult();
  document.getElementById("quiz-section").style.display = "none";
  const sec = document.getElementById("result-section");
  sec.style.display = "block";
  sec.className = "result-wrap";
  sec.innerHTML = `
    <div class="result-hero" style="background:${r.heroBg}">
      <span class="result-emoji">${r.emoji}</span>
      <div class="result-type-label">${r.type}</div>
      <div class="result-type">나는 "${r.persona}"</div>
      <div class="result-persona">${r.desc}</div>
    </div>
    <div class="result-body">
      <div class="road-label">추천 강의 로드맵</div>
      <div class="road-steps">
        ${r.steps.map((s, i) => {
          var linkHtml = s.url
            ? '<a href="' + s.url + '" target="_blank" class="step-link">강의 보기 &#8594;</a>'
            : "";
          return '<div class="road-step" style="background:' + s.stepBg + '">'
            + '<div class="step-num" style="background:' + s.numBg + '">' + (i + 1) + '</div>'
            + '<div style="flex:1"><div class="step-name">' + s.name + '</div>'
            + '<div class="step-cat">' + s.cat + '</div></div>'
            + linkHtml
            + '</div>';
        }).join("")}
      </div>
      <div class="tip-box">
        <div class="tip-label">${r.tipLabel}</div>
        ${r.tip}
      </div>
    </div>
    <div class="restart-row">
      <button class="restart-btn" onclick="restart()">← 다시 하기</button>
    </div>`;
}

function restart() {
  answers = [];
  curQ = 0;
  document.getElementById("result-section").style.display = "none";
  document.getElementById("quiz-section").style.display = "block";
  render();
}

render();
</script>
